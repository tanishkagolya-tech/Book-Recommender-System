<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            📚 Book Recommender
        </a>

        <ul class="nav navbar-nav">
            <li><a href="/">Home</a></li>
            <li><a href="/recommend">Recommend</a></li>
        </ul>

    </div>
</nav>

<div class="container">

    <h1 class="page-title">
        📚 Top 50 Books
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="stats-box">
                <div class="stats-number">50+</div>
                <div>Popular Books</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-box">
                <div class="stats-number">1M+</div>
                <div>Ratings Analyzed</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-box">
                <div class="stats-number">80K+</div>
                <div>Readers</div>
            </div>
        </div>

    </div>

    <div class="row">

        {% for i in range(book_name|length) %}

        <div class="col-md-3">

            <div class="card">

                <img src="{{ image[i] }}"
                     class="book-img"
                     alt="Book Cover">

                <p class="book-title">
                    {{ book_name[i] }}
                </p>

                <h4 class="book-author">
                    {{ author[i] }}
                </h4>

                <p class="vote">
                    Votes : {{ votes[i] }}
                </p>

                <p class="rating">
                    ⭐ {{ rating[i] }}
                </p>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
