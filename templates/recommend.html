<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommendation</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            📚 Book Recommender
        </a>

        <ul class="nav navbar-nav">
            <li><a href="/">Home</a></li>
            <li><a href="/recommend">Recommend</a></li>
        </ul>

    </div>
</nav>

<div class="container">

    <h1 class="page-title">
        🔍 Find Similar Books
    </h1>

    <div class="search-box">

        <form action="/recommend_books" method="post">

            <input
                name="user_input"
                type="text"
                class="form-control"
                placeholder="Enter Book Name">

            <br>

            <input
                type="submit"
                value="Recommend Books"
                class="btn btn-custom btn-lg">

        </form>

    </div>

    <div class="row">

        {% if data %}

            {% for i in data %}

            <div class="col-md-3">

                <div class="card">

                    <img src="{{ i[2] }}"
                         class="book-img"
                         alt="Book Cover">

                    <p class="book-title">
                        {{ i[0] }}
                    </p>

                    <h4 class="book-author">
                        {{ i[1] }}
                    </h4>

                </div>

            </div>

            {% endfor %}

        {% endif %}

    </div>

</div>

</body>
</html>
